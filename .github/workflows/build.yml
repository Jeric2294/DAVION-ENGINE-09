name: Build Module

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          zip -r GovThermal-$(date +%Y%m%d-%H%M).zip . \
            --exclude "*.git*" \
            --exclude ".github/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GovThermal-build
          path: "GovThermal-*.zip"
          retention-days: 30
